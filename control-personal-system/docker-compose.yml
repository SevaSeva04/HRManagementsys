version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hr_system
      POSTGRES_USER: hr_admin
      POSTGRES_PASSWORD: hr_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_admin -d hr_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://hr_admin:hr_secret_2024@db:5432/hr_system
      JWT_SECRET: hr-system-jwt-secret-key-2024
      JWT_REFRESH_SECRET: hr-system-jwt-refresh-secret-2024
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js && node dist/src/index.js"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
